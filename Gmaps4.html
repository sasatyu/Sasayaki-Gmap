<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>緯度経度データを点群表示＋矩形選択</title>
<style>
  #map {
    width: 100%;
    height: 600px;
  }

  .bottom-container {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }

  textarea {
    width: 40%;
    height: 120px;
  }

  #output {
    width: 60%;
    height: 120px;
    white-space: pre;
    border: 1px solid #ccc;
    padding: 5px;
    overflow-y: auto;
    background: #f9f9f9;
  }
</style>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBlAKA1Vz5_WSMSV2JYGMY2Zic5OxybQq4&libraries=drawing"></script>
</head>
<body>
<h3>緯度経度データを点群表示＋矩形選択</h3>

<div class="bottom-container">
  <textarea id="input" placeholder="139.000 35.000"></textarea>
  <div id="output">選択結果がここに表示されます</div>

    <button onclick="copyOutput()">
      クリップボードにコピー
    </button>

</div>


<button onclick="loadPoints()">点群を表示</button>
<br>
<br>
<div id="map"></div>

<script>
let map;
let markers = [];
let points = [];

// コピーボタン
function copyOutput() {
  const text = document.getElementById("output").textContent;

  if (!text || text.includes("ありません")) {
    alert("コピーする内容がありません");
    return;
  }

  navigator.clipboard.writeText(text)
    .then(() => alert("コピーしました"))
    .catch(() => alert("コピーに失敗しました"));
}

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 35.281, lng: 139.214 },
    zoom: 10
  });

  // 矩形選択
  const drawingManager = new google.maps.drawing.DrawingManager({
    drawingMode: google.maps.drawing.OverlayType.RECTANGLE,
    drawingControl: true,
    drawingControlOptions: {
      drawingModes: ["rectangle"]
    }
  });
  drawingManager.setMap(map);

  google.maps.event.addListener(drawingManager, "overlaycomplete", e => {
    const bounds = e.overlay.getBounds();

    const selected = points.filter(p =>
      bounds.contains(new google.maps.LatLng(p.lat, p.lng))
    );

    document.getElementById("output").textContent =
      selected.length === 0
        ? "範囲内の点はありません"
        : selected
            .map(p => `${p.lng.toFixed(3)}\t${p.lat.toFixed(3)}`)
            .join("\n");

    e.overlay.setMap(null);
  });
}

function loadPoints() {
  markers.forEach(m => m.setMap(null));
  markers = [];
  points = [];

  const lines = document.getElementById("input").value.trim().split("\n");

  lines.forEach(line => {
    const [lng, lat] = line.trim().split(/[\s,]+/).map(Number);

    if (!isNaN(lat) && !isNaN(lng)) {
      const p = { lat, lng };
      points.push(p);

      const marker = new google.maps.Marker({
        position: p,
        map: map
      });
      markers.push(marker);
    }
  });
}

initMap();
</script>
</body>
</html>
